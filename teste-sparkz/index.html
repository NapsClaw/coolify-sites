<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Sparkz Agency</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { text-align: center; padding: 3rem; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #888; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .check { font-size: 4rem; margin-bottom: 1rem; }
        .domain { color: #667eea; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✅</div>
        <h1>Sparkz Agency</h1>
        <p>Domínio <span class="domain">sparkz.agency</span> funcionando!</p>
        <p>SSL + Coolify + Wildcard DNS</p>
        <p style="color: #555; margin-top: 2rem; font-size: 0.9rem;">Teste realizado em 08/03/2026</p>
    </div>
</body>
</html>
