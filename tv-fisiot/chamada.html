<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Chamada — Fisiot</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0d0d1a;color:#fff;min-height:100vh;padding:16px}
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-icon{width:36px;height:36px;background:#CC0000;border-radius:7px;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:2px;padding:4px}
    .logo-icon span{background:#fff;border-radius:1px}
    .logo-icon span:nth-child(2),.logo-icon span:nth-child(4),.logo-icon span:nth-child(6),.logo-icon span:nth-child(8){background:#CC0000}
    .logo h1{font-size:1.1rem;font-weight:800}
    .logo h1 small{display:block;font-size:.65rem;color:rgba(255,255,255,.5);font-weight:500}
    .relogio{font-size:1.4rem;font-weight:800;color:#FFD700;background:#1a1a2e;padding:7px 16px;border-radius:9px;border:1px solid rgba(204,0,0,.3)}
    .periodo-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;font-size:.8rem;font-weight:700}
    .periodo-badge.manha{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);color:#FFD700}
    .periodo-badge.tarde{background:rgba(255,140,0,.15);border:1px solid rgba(255,140,0,.4);color:#FF8C00}
    .tab-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .tab{padding:7px 16px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
    .tab.on{background:#CC0000;color:#fff}
    .tab.off{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)}
    /* Grid ginásios */
    .gin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
    .gin-card{background:#1a1a2e;border:1px solid rgba(204,0,0,.25);border-radius:14px;overflow:hidden}
    .gin-head{background:rgba(204,0,0,.15);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(204,0,0,.2)}
    .gin-head h2{font-size:.95rem;font-weight:800;color:#CC0000;text-transform:uppercase;letter-spacing:.5px}
    .gin-prof{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px}
    .gin-body{padding:12px}
    /* Grupo de horário */
    .grupo{background:#0d0d1a;border-radius:10px;margin-bottom:10px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
    .grupo-head{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;background:#13132a;cursor:pointer}
    .grupo-hora{font-size:1rem;font-weight:800;color:#FFD700}
    .grupo-info{font-size:.72rem;color:rgba(255,255,255,.4)}
    .grupo-actions{display:flex;gap:6px;align-items:center}
    .btn-chamar-grupo{background:#CC0000;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn-chamar-grupo:hover{background:#a80000}
    .btn-small{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:3px 8px;font-size:.68rem;cursor:pointer;font-family:inherit}
    .grupo-lista{padding:8px 12px}
    /* Item paciente */
    .pac-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:#1a1a2e;border-left:3px solid #333;transition:all .4s;cursor:pointer}
    .pac-item.atual{border-left-color:#FFD700;background:#1a1800;box-shadow:0 0 10px rgba(255,215,0,.1)}
    .pac-item.chamado{border-left-color:#4CAF50;background:#0a1a0a;opacity:.55}
    .pac-item.pendente{border-left-color:rgba(204,0,0,.4)}
    .pac-num{font-size:.7rem;font-weight:800;color:rgba(255,255,255,.3);min-width:16px;text-align:center}
    .pac-nome{flex:1;font-size:.88rem;font-weight:700}
    .pac-status{font-size:.65rem;padding:2px 7px;border-radius:12px;font-weight:700;white-space:nowrap}
    .pac-status.ok{background:rgba(76,175,80,.2);color:#4CAF50}
    .pac-status.atual{background:rgba(255,215,0,.2);color:#FFD700}
    .pac-status.esp{background:rgba(255,255,255,.07);color:rgba(255,255,255,.35)}
    .pac-btn{background:rgba(204,0,0,.15);color:#ff7777;border:1px solid rgba(204,0,0,.25);border-radius:5px;padding:3px 8px;font-size:.65rem;cursor:pointer;font-family:inherit;transition:all .2s}
    .pac-btn:hover{background:#CC0000;color:#fff}
    .pac-del{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:3px 6px;font-size:.65rem;cursor:pointer;font-family:inherit}
    /* Adicionar inline */
    .add-inline{padding:8px 12px;border-top:1px solid rgba(255,255,255,.05)}
    .add-inline-row{display:flex;gap:6px}
    .add-inline input{flex:1;background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 10px;font-size:.82rem;color:#fff;font-family:inherit;outline:none}
    .add-inline input:focus{border-color:#CC0000}
    .add-inline button{background:#CC0000;color:#fff;border:none;border-radius:7px;padding:7px 12px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
    .add-inline button:hover{background:#a80000}
    /* Banner chamada */
    .chamada-banner{display:none;position:fixed;top:16px;right:16px;background:#0a2010;border:2px solid #4CAF50;border-radius:12px;padding:14px 18px;max-width:300px;z-index:999;animation:slidein .3s ease}
    .chamada-banner.show{display:block}
    @keyframes slidein{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
    .chamada-banner h3{font-size:.7rem;color:#4CAF50;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
    .chamada-banner p{font-size:.9rem;font-weight:700;color:#fff}
    .chamada-banner span{color:#FFD700}
    /* Form chamar agora */
    .form-card{background:#1a1a2e;border:1px solid rgba(204,0,0,.25);border-radius:14px;padding:20px;max-width:460px;margin:0 auto}
    .form-card h2{font-size:.95rem;font-weight:700;color:#CC0000;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
    .field{margin-bottom:12px}
    label{display:block;font-size:.7rem;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
    input,select{width:100%;background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:9px 12px;font-size:.9rem;color:#fff;font-family:inherit;outline:none;transition:border .2s}
    input:focus,select:focus{border-color:#CC0000}
    select option{background:#0d0d1a}
    .btn{width:100%;background:#CC0000;color:#fff;border:none;border-radius:9px;padding:12px;font-size:.85rem;font-weight:800;cursor:pointer;margin-top:4px;transition:all .2s;text-transform:uppercase;letter-spacing:.8px;font-family:inherit}
    .btn:hover{background:#a80000}
    .ok-msg{display:none;margin-top:10px;background:#0d1a0d;border:1px solid #4CAF50;border-radius:7px;padding:10px;text-align:center;color:#4CAF50;font-weight:700;font-size:.85rem}
    .empty{color:rgba(255,255,255,.25);font-size:.8rem;text-align:center;padding:14px}
    .dot{width:7px;height:7px;background:#4CAF50;border-radius:50%;animation:blink 1.5s infinite;display:inline-block;margin-right:5px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  </style>
</head>
<body>

<div class="chamada-banner" id="chamada-banner">
  <h3><span class="dot"></span>Chamada realizada</h3>
  <p id="chamada-banner-txt"></p>
</div>

<div class="top">
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <h1>TV Fisiot <small>Painel de Chamada</small></h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div id="periodo-badge" class="periodo-badge manha">☀️ Manhã</div>
    <div class="relogio" id="relogio">--:--</div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab on" id="tab1" onclick="trocarAba(1)">📋 Agenda do Dia</button>
  <button class="tab off" id="tab2" onclick="trocarAba(2)">📢 Chamar Agora</button>
</div>

<!-- ABA 1: Agenda -->
<div id="aba1">
  <div id="gin-grid" class="gin-grid"></div>
</div>

<!-- ABA 2: Chamar agora -->
<div id="aba2" style="display:none">
  <div class="form-card">
    <h2>📢 Chamar Agora</h2>
    <div class="field">
      <label>Nome do Paciente</label>
      <input type="text" id="now-nome" placeholder="Ex: João Silva" autocomplete="off">
    </div>
    <div class="field">
      <label>Ginásio</label>
      <select id="now-gin" onchange="atualizarProfNow()">
        <option value="G1">Ginásio 1</option>
        <option value="G2">Ginásio 2</option>
        <option value="G3">Ginásio 3</option>
      </select>
    </div>
    <div class="field">
      <label>Profissional</label>
      <div id="now-prof-display" style="background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:9px 12px;font-size:.88rem;color:rgba(255,255,255,.6)">—</div>
    </div>
    <button class="btn" onclick="chamarAgora()">📢 CHAMAR AGORA</button>
    <div class="ok-msg" id="now-ok">✅ Chamada enviada para a TV!</div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO DOS GINÁSIOS
// ============================================================
const CFG = {
  G1: {
    nome: 'Ginásio 1',
    prof: {
      manha: { todos: 'Dra. Bárbara' },
      tarde:  { '135': 'Dra. Nathalia', '24': 'Dra. Kênia' }
    },
    grupos: {
      manha: ['07:00','07:40','08:20','09:00','09:40','10:20'],
      tarde:  ['13:00','13:40','14:20','15:00','15:40','16:20','17:00']
    },
    maxPorGrupo: 6
  },
  G2: {
    nome: 'Ginásio 2',
    prof: {
      manha: { todos: 'Dra. Lívia' },
      tarde:  { todos: 'Dra. Miriam' }
    },
    grupos: {
      manha: ['07:20','08:00','08:40','09:20','10:00','10:40'],
      tarde:  ['13:00','13:40','14:20','15:00','15:40','16:20']
    },
    maxPorGrupo: 6
  },
  G3: {
    nome: 'Ginásio 3',
    prof: {
      manha: { '135': 'Dra. Priscila', '24': 'Dra. Daniela (Neuro)' },
      tarde:  null
    },
    grupos: {
      manha: { '135': ['07:00','07:20','08:00'], '24': ['07:40','08:20','09:00','09:40','10:20','11:00'] },
      tarde:  []
    },
    maxPorGrupo: 6
  }
};

// Dia: Seg/Qua/Sex = '135', Ter/Qui = '24'
function getDiaTipo() {
  const d = new Date().getDay();
  return [1,3,5].includes(d) ? '135' : '24';
}

function getPeriodo(h) {
  return parseInt(h.split(':')[0]) < 13 ? 'manha' : 'tarde';
}

function getHoraAtual() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

function getProfissional(ginId, periodo) {
  const p = CFG[ginId].prof[periodo];
  if (!p) return null;
  if (p.todos) return p.todos;
  return p[getDiaTipo()] || null;
}

function getGrupos(ginId, periodo) {
  const g = CFG[ginId].grupos[periodo];
  if (!g) return [];
  if (Array.isArray(g)) return g;
  return g[getDiaTipo()] || [];
}

// ============================================================
// RELÓGIO
// ============================================================
function tick() {
  const h = getHoraAtual();
  document.getElementById('relogio').textContent = h;
  const p = getPeriodo(h);
  const b = document.getElementById('periodo-badge');
  b.className = 'periodo-badge ' + p;
  b.innerHTML = p === 'manha' ? '☀️ Manhã' : '🌤️ Tarde';
}
tick(); setInterval(tick, 1000);

// ============================================================
// ABAS
// ============================================================
function trocarAba(n) {
  [1,2].forEach(i => {
    document.getElementById('aba'+i).style.display = i===n?'block':'none';
    document.getElementById('tab'+i).className = 'tab '+(i===n?'on':'off');
  });
  if (n===2) atualizarProfNow();
}

// ============================================================
// STORAGE — estrutura: { G1: { '07:00': ['Nome1','Nome2',...], chamados: {'07:00_0': true} } }
// ============================================================
function getAgenda() { return JSON.parse(localStorage.getItem('fisiot_v3')||'{}'); }
function saveAgenda(a) { localStorage.setItem('fisiot_v3', JSON.stringify(a)); }

function getPacientes(ginId, hora) {
  const a = getAgenda();
  return (a[ginId] && a[ginId][hora]) ? a[ginId][hora] : [];
}

function getChamados(ginId) {
  const a = getAgenda();
  return (a[ginId] && a[ginId]._chamados) ? a[ginId]._chamados : {};
}

function setChamado(ginId, hora, idx) {
  const a = getAgenda();
  if (!a[ginId]) a[ginId] = {};
  if (!a[ginId]._chamados) a[ginId]._chamados = {};
  a[ginId]._chamados[hora+'_'+idx] = true;
  saveAgenda(a);
}

function addPaciente(ginId, hora, nome) {
  const a = getAgenda();
  if (!a[ginId]) a[ginId] = {};
  if (!a[ginId][hora]) a[ginId][hora] = [];
  if (a[ginId][hora].length >= CFG[ginId].maxPorGrupo) return false;
  a[ginId][hora].push(nome);
  saveAgenda(a);
  return true;
}

function removePaciente(ginId, hora, idx) {
  const a = getAgenda();
  if (!a[ginId] || !a[ginId][hora]) return;
  a[ginId][hora].splice(idx, 1);
  // Reindexar chamados
  const ch = a[ginId]._chamados || {};
  const novo = {};
  Object.keys(ch).forEach(k => {
    const [h, i] = k.split('_');
    const ni = parseInt(i);
    if (h !== hora) { novo[k] = true; return; }
    if (ni < idx) novo[k] = true;
    else if (ni > idx) novo[h+'_'+(ni-1)] = true;
  });
  a[ginId]._chamados = novo;
  saveAgenda(a);
}

function limparGrupo(ginId, hora) {
  if (!confirm('Limpar grupo das '+hora+' do '+CFG[ginId].nome+'?')) return;
  const a = getAgenda();
  if (a[ginId]) {
    a[ginId][hora] = [];
    const ch = a[ginId]._chamados || {};
    Object.keys(ch).forEach(k => { if (k.startsWith(hora+'_')) delete ch[k]; });
  }
  saveAgenda(a);
  renderAgenda();
}

// ============================================================
// RENDER
// ============================================================
function renderAgenda() {
  const h = getHoraAtual();
  const periodo = getPeriodo(h);
  const grid = document.getElementById('gin-grid');
  grid.innerHTML = '';

  ['G1','G2','G3'].forEach(ginId => {
    const prof = getProfissional(ginId, periodo);
    if (!prof) return;
    const grupos = getGrupos(ginId, periodo);
    if (!grupos.length) return;

    const card = document.createElement('div');
    card.className = 'gin-card';

    const gruposHTML = grupos.map(hora => {
      const pacs = getPacientes(ginId, hora);
      const chamados = getChamados(ginId);
      const count = pacs.length;
      const max = CFG[ginId].maxPorGrupo;
      const isAtual = hora === h;

      const pacHTML = pacs.length ? pacs.map((nome, i) => {
        const key = hora+'_'+i;
        const chamado = chamados[key];
        let cls = chamado ? 'chamado' : (isAtual && !chamado ? 'atual' : 'pendente');
        let scls = chamado ? 'ok' : (isAtual ? 'atual' : 'esp');
        let stxt = chamado ? '✅' : (isAtual ? '🔔' : '⏳');
        return `<div class="pac-item ${cls}">
          <div class="pac-num">${i+1}</div>
          <div class="pac-nome">${nome}</div>
          <span class="pac-status ${scls}">${stxt}</span>
          ${!chamado ? `<button class="pac-btn" onclick="chamarPac('${ginId}','${hora}',${i})">📢</button>` : ''}
          <button class="pac-del" onclick="removerErender('${ginId}','${hora}',${i})">✕</button>
        </div>`;
      }).join('') : `<div class="empty">Sem pacientes · <em>Adicione abaixo</em></div>`;

      const podeAdicionar = count < max;
      const addHTML = podeAdicionar ? `
        <div class="add-inline">
          <div class="add-inline-row">
            <input type="text" id="inp-${ginId}-${hora.replace(':','')}" placeholder="Nome do paciente ${count+1}..." autocomplete="off" onkeydown="if(event.key==='Enter')addPacBtn('${ginId}','${hora}')">
            <button onclick="addPacBtn('${ginId}','${hora}')">+ Adicionar</button>
          </div>
        </div>` : '';

      const headStyle = isAtual ? 'background:rgba(255,215,0,.12)' : '';
      return `<div class="grupo">
        <div class="grupo-head" style="${headStyle}">
          <div>
            <div class="grupo-hora">${hora} ${isAtual ? '🔔' : ''}</div>
            <div class="grupo-info">${count}/${max} pacientes</div>
          </div>
          <div class="grupo-actions">
            ${count > 0 ? `<button class="btn-chamar-grupo" onclick="chamarProximo('${ginId}','${hora}')">📢 Chamar próximo</button>` : ''}
            ${count > 0 ? `<button class="btn-small" onclick="limparGrupo('${ginId}','${hora}')">🗑</button>` : ''}
          </div>
        </div>
        <div class="grupo-lista">${pacHTML}</div>
        ${addHTML}
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="gin-head">
        <div>
          <h2>${CFG[ginId].nome}</h2>
          <div class="gin-prof">${prof}</div>
        </div>
      </div>
      <div class="gin-body">${gruposHTML || '<div class="empty">Sem horários neste período</div>'}</div>
    `;
    grid.appendChild(card);
  });
}

function removerErender(ginId, hora, idx) {
  removePaciente(ginId, hora, idx);
  renderAgenda();
}

function addPacBtn(ginId, hora) {
  const inp = document.getElementById('inp-'+ginId+'-'+hora.replace(':',''));
  if (!inp) return;
  const nome = inp.value.trim();
  if (!nome) { inp.focus(); return; }
  if (!addPaciente(ginId, hora, nome)) {
    alert('Máximo de 6 pacientes por grupo!');
    return;
  }
  inp.value = '';
  renderAgenda();
  // Re-focar no próximo input se existir
  setTimeout(() => {
    const ni = document.getElementById('inp-'+ginId+'-'+hora.replace(':',''));
    if (ni) ni.focus();
  }, 100);
}

// ============================================================
// CHAMADA
// ============================================================
function falar(msg) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(msg);
    utt.lang = 'pt-BR'; utt.rate = 0.88; utt.pitch = 1; utt.volume = 1;
    const vs = window.speechSynthesis.getVoices();
    const v = vs.find(x => x.lang==='pt-BR') || vs.find(x => x.lang.startsWith('pt'));
    if (v) utt.voice = v;
    window.speechSynthesis.speak(utt);
  }, 80);
}

function mostrarBanner(txt) {
  const b = document.getElementById('chamada-banner');
  document.getElementById('chamada-banner-txt').innerHTML = txt;
  b.classList.add('show');
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), 7000);
}

function chamarPac(ginId, hora, idx) {
  const pacs = getPacientes(ginId, hora);
  if (!pacs[idx]) return;
  const nome = pacs[idx];
  const periodo = getPeriodo(hora);
  const prof = getProfissional(ginId, periodo);
  const gin = CFG[ginId].nome;
  const msg = `Atenção! Paciente ${nome}, por favor dirija-se ao ${gin}.`;
  falar(msg);
  mostrarBanner(`<span>${nome}</span> → ${gin} · ${prof}`);
  localStorage.setItem('fisiot_chamada', JSON.stringify({nome,ginasio:gin,profissional:prof,horario:hora,msg,timestamp:Date.now()}));
  setChamado(ginId, hora, idx);
  renderAgenda();
}

function chamarProximo(ginId, hora) {
  const pacs = getPacientes(ginId, hora);
  const chamados = getChamados(ginId);
  const idx = pacs.findIndex((_, i) => !chamados[hora+'_'+i]);
  if (idx === -1) { alert('Todos os pacientes deste grupo já foram chamados!'); return; }
  chamarPac(ginId, hora, idx);
}

function chamarAgora() {
  const nome = document.getElementById('now-nome').value.trim();
  const ginId = document.getElementById('now-gin').value;
  if (!nome) { alert('Digite o nome!'); return; }
  const h = getHoraAtual();
  const periodo = getPeriodo(h);
  const prof = getProfissional(ginId, periodo);
  const gin = CFG[ginId].nome;
  const msg = `Atenção! Paciente ${nome}, por favor dirija-se ao ${gin}.`;
  falar(msg);
  mostrarBanner(`<span>${nome}</span> → ${gin} · ${prof||''}`);
  localStorage.setItem('fisiot_chamada', JSON.stringify({nome,ginasio:gin,profissional:prof,horario:h,msg,timestamp:Date.now()}));
  document.getElementById('now-ok').style.display = 'block';
  setTimeout(()=>document.getElementById('now-ok').style.display='none', 3000);
  document.getElementById('now-nome').value = '';
}

function atualizarProfNow() {
  const ginId = document.getElementById('now-gin').value;
  const h = getHoraAtual();
  const periodo = getPeriodo(h);
  const prof = getProfissional(ginId, periodo);
  document.getElementById('now-prof-display').textContent = prof || 'Sem atendimento neste período';
}

// ============================================================
// AUTO-CHAMADA nos horários exatos
// ============================================================
var autoKeys = new Set();
function verificarAuto() {
  const h = getHoraAtual();
  const periodo = getPeriodo(h);
  ['G1','G2','G3'].forEach(ginId => {
    const prof = getProfissional(ginId, periodo);
    if (!prof) return;
    const grupos = getGrupos(ginId, periodo);
    if (!grupos.includes(h)) return;
    const pacs = getPacientes(ginId, h);
    const chamados = getChamados(ginId);
    const idx = pacs.findIndex((_, i) => !chamados[h+'_'+i]);
    if (idx === -1) return;
    const key = ginId+'_'+h+'_auto_'+idx;
    if (autoKeys.has(key)) return;
    autoKeys.add(key);
    chamarPac(ginId, h, idx);
  });
}

setInterval(verificarAuto, 30000);
setInterval(renderAgenda, 60000);

// Init
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = ()=>window.speechSynthesis.getVoices();
}
atualizarProfNow();
renderAgenda();
</script>
