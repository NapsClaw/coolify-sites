<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Chamada — Fisiot</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0d0d1a;color:#fff;min-height:100vh;padding:20px}
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:40px;height:40px;background:#CC0000;border-radius:8px;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:2px;padding:5px}
    .logo-icon span{background:#fff;border-radius:1px}
    .logo-icon span:nth-child(2),.logo-icon span:nth-child(4),.logo-icon span:nth-child(6),.logo-icon span:nth-child(8){background:#CC0000}
    .logo h1{font-size:1.2rem;font-weight:800}
    .logo h1 small{display:block;font-size:.7rem;color:rgba(255,255,255,.5);font-weight:500}
    .relogio{font-size:1.5rem;font-weight:800;color:#FFD700;background:#1a1a2e;padding:8px 18px;border-radius:10px;border:1px solid rgba(204,0,0,.3)}
    .periodo-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:50px;font-size:.85rem;font-weight:700;margin-bottom:16px}
    .periodo-badge.manha{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);color:#FFD700}
    .periodo-badge.tarde{background:rgba(255,140,0,.15);border:1px solid rgba(255,140,0,.4);color:#FF8C00}
    .tab-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .tab{padding:8px 18px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
    .tab.on{background:#CC0000;color:#fff}
    .tab.off{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5)}
    /* Grid de ginásios */
    .gin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:20px}
    .gin-card{background:#1a1a2e;border:1px solid rgba(204,0,0,.3);border-radius:16px;padding:20px}
    .gin-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .gin-title h2{font-size:1rem;font-weight:800;color:#CC0000;text-transform:uppercase;letter-spacing:1px}
    .gin-prof{font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:14px}
    .seq-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:8px;background:#0d0d1a;border-left:4px solid #333;transition:all .4s}
    .seq-item.atual{border-left-color:#FFD700;background:#1a1800;animation:pulse-border 1s infinite alternate}
    .seq-item.chamado{border-left-color:#4CAF50;background:#0a1a0a;opacity:.6}
    .seq-item.proximo{border-left-color:rgba(204,0,0,.5)}
    @keyframes pulse-border{from{box-shadow:0 0 0 0 rgba(255,215,0,.3)}to{box-shadow:0 0 12px 2px rgba(255,215,0,.15)}}
    .seq-num{font-size:.75rem;font-weight:800;color:rgba(255,255,255,.3);min-width:20px;text-align:center}
    .seq-hora{font-size:.95rem;font-weight:800;color:#FFD700;min-width:50px}
    .seq-nome{flex:1;font-size:.9rem;font-weight:700}
    .seq-btn{background:rgba(204,0,0,.2);color:#ff6666;border:1px solid rgba(204,0,0,.3);border-radius:6px;padding:5px 10px;font-size:.75rem;cursor:pointer;transition:all .2s;font-family:inherit}
    .seq-btn:hover{background:#CC0000;color:#fff}
    .seq-status{font-size:.7rem;padding:3px 8px;border-radius:20px;font-weight:700}
    .seq-status.ok{background:rgba(76,175,80,.2);color:#4CAF50}
    .seq-status.atual{background:rgba(255,215,0,.2);color:#FFD700}
    .seq-status.esp{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4)}
    /* Chamada ativa banner */
    .chamada-banner{display:none;position:fixed;top:20px;right:20px;background:#0a1a0a;border:2px solid #4CAF50;border-radius:14px;padding:16px 20px;max-width:320px;z-index:999;animation:slidein .4s ease}
    .chamada-banner.show{display:block}
    @keyframes slidein{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    .chamada-banner h3{font-size:.75rem;color:#4CAF50;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
    .chamada-banner p{font-size:.95rem;font-weight:700;color:#fff}
    .chamada-banner span{color:#FFD700}
    /* Formulário */
    .form-card{background:#1a1a2e;border:1px solid rgba(204,0,0,.3);border-radius:16px;padding:24px;max-width:500px;margin:0 auto}
    .form-card h2{font-size:1rem;font-weight:700;color:#CC0000;margin-bottom:18px;text-transform:uppercase;letter-spacing:1px}
    .field{margin-bottom:14px}
    label{display:block;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
    input,select{width:100%;background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:.95rem;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border .2s}
    input:focus,select:focus{border-color:#CC0000}
    select option{background:#0d0d1a;color:#fff}
    .btn{width:100%;background:#CC0000;color:#fff;border:none;border-radius:10px;padding:13px;font-size:.9rem;font-weight:800;cursor:pointer;margin-top:6px;transition:all .2s;text-transform:uppercase;letter-spacing:1px;font-family:inherit}
    .btn:hover{background:#a80000}
    .btn-sec{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:inherit}
    .btn-sec:hover{background:rgba(255,0,0,.1);color:#fff}
    .ok-msg{display:none;margin-top:12px;background:#0d1a0d;border:1px solid #4CAF50;border-radius:8px;padding:12px;text-align:center;color:#4CAF50;font-weight:700}
    .empty{color:rgba(255,255,255,.3);font-size:.85rem;text-align:center;padding:20px}
    .gin-actions{display:flex;gap:8px;margin-bottom:14px}
    .dot-live{width:8px;height:8px;background:#4CAF50;border-radius:50%;animation:pulse-dot 1.5s infinite;display:inline-block;margin-right:6px}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>

<div class="chamada-banner" id="chamada-banner">
  <h3><span class="dot-live"></span>Chamada realizada</h3>
  <p id="chamada-banner-txt"></p>
</div>

<div class="top">
  <div class="logo">
    <div class="logo-icon"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <h1>TV Fisiot <small>Painel de Chamada</small></h1>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div id="periodo-badge" class="periodo-badge manha">☀️ Período da Manhã</div>
    <div class="relogio" id="relogio">--:--</div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab on" id="tab1" onclick="trocarAba(1)">📋 Agenda do Dia</button>
  <button class="tab off" id="tab2" onclick="trocarAba(2)">➕ Adicionar Paciente</button>
  <button class="tab off" id="tab3" onclick="trocarAba(3)">📢 Chamar Agora</button>
</div>

<!-- ABA 1: Agenda -->
<div id="aba1">
  <div id="gin-grid" class="gin-grid"></div>
</div>

<!-- ABA 2: Adicionar -->
<div id="aba2" style="display:none">
  <div class="form-card">
    <h2>➕ Adicionar Paciente</h2>
    <div class="field">
      <label>Nome do Paciente</label>
      <input type="text" id="add-nome" placeholder="Ex: João Silva" autocomplete="off">
    </div>
    <div class="field">
      <label>Ginásio</label>
      <select id="add-gin" onchange="atualizarProf()">
        <option value="G1">Ginásio 1</option>
        <option value="G2">Ginásio 2</option>
        <option value="G3">Ginásio 3</option>
      </select>
    </div>
    <div class="field">
      <label>Horário</label>
      <select id="add-hora"></select>
    </div>
    <div class="field">
      <label>Profissional</label>
      <div id="add-prof-display" style="background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:.9rem;color:rgba(255,255,255,.7)">—</div>
    </div>
    <button class="btn" onclick="adicionarPaciente()">➕ ADICIONAR À AGENDA</button>
    <div class="ok-msg" id="add-ok">✅ Paciente adicionado!</div>
  </div>
</div>

<!-- ABA 3: Chamar agora -->
<div id="aba3" style="display:none">
  <div class="form-card">
    <h2>📢 Chamar Agora</h2>
    <div class="field">
      <label>Nome do Paciente</label>
      <input type="text" id="now-nome" placeholder="Ex: João Silva" autocomplete="off">
    </div>
    <div class="field">
      <label>Ginásio</label>
      <select id="now-gin" onchange="atualizarProfNow()">
        <option value="G1">Ginásio 1</option>
        <option value="G2">Ginásio 2</option>
        <option value="G3">Ginásio 3</option>
      </select>
    </div>
    <div class="field">
      <label>Profissional</label>
      <div id="now-prof-display" style="background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:.9rem;color:rgba(255,255,255,.7)">—</div>
    </div>
    <button class="btn" onclick="chamarAgora()">📢 CHAMAR AGORA</button>
    <div class="ok-msg" id="now-ok">✅ Chamada enviada para a TV!</div>
  </div>
</div>

<script>
// ============================
// CONFIGURAÇÃO
// ============================
const AGENDA_CONFIG = {
  G1: {
    nome: 'Ginásio 1',
    profissionais: {
      manha: { todos: 'Dra. Bárbara' },
      tarde: {
        '135': 'Dra. Nathalia', // Seg/Qua/Sex
        '24':  'Dra. Kênia'     // Ter/Qui
      }
    },
    horarios: {
      manha: ['07:00','07:40','08:20','09:00','09:40','10:20'],
      tarde:  ['13:00','13:40','14:20','15:00','15:40','16:20','17:00']
    }
  },
  G2: {
    nome: 'Ginásio 2',
    profissionais: {
      manha: { todos: 'Dra. Lívia' },
      tarde:  { todos: 'Dra. Miriam' }
    },
    horarios: {
      manha: ['07:20','08:00','08:40','09:20','10:00','10:40'],
      tarde:  ['13:00','13:40','14:20','15:00','15:40','16:20']
    }
  },
  G3: {
    nome: 'Ginásio 3',
    profissionais: {
      manha: {
        '135': 'Dra. Priscila',  // Seg/Qua/Sex
        '24':  'Dra. Daniela (Neuro)' // Ter/Qui
      },
      tarde: null // sem tarde
    },
    horarios: {
      manha: {
        '135': ['07:00','07:20','08:00'],
        '24':  ['07:40','08:20','09:00','09:40','10:20','11:00']
      },
      tarde: []
    }
  }
};

// Dias: 0=Dom,1=Seg,2=Ter,3=Qua,4=Qui,5=Sex,6=Sab
function getDiaTipo() {
  const d = new Date().getDay();
  if ([1,3,5].includes(d)) return '135'; // Seg/Qua/Sex
  if ([2,4].includes(d)) return '24';    // Ter/Qui
  return '135'; // default
}

function getPeriodo(hora) {
  const h = parseInt(hora.split(':')[0]);
  return h < 13 ? 'manha' : 'tarde';
}

function getProfissional(ginId, periodo) {
  const cfg = AGENDA_CONFIG[ginId];
  if (!cfg.profissionais[periodo]) return null;
  const p = cfg.profissionais[periodo];
  if (p && p.todos) return p.todos;
  const dia = getDiaTipo();
  return p[dia] || null;
}

function getHorarios(ginId, periodo) {
  const cfg = AGENDA_CONFIG[ginId];
  const h = cfg.horarios[periodo];
  if (!h) return [];
  if (Array.isArray(h)) return h;
  const dia = getDiaTipo();
  return h[dia] || [];
}

// ============================
// RELÓGIO E PERÍODO
// ============================
function tick() {
  const n = new Date();
  const hStr = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
  document.getElementById('relogio').textContent = hStr;
  const periodo = getPeriodo(hStr);
  const badge = document.getElementById('periodo-badge');
  if (periodo === 'manha') {
    badge.className = 'periodo-badge manha';
    badge.innerHTML = '☀️ Período da Manhã';
  } else {
    badge.className = 'periodo-badge tarde';
    badge.innerHTML = '🌤️ Período da Tarde';
  }
}
tick(); setInterval(tick, 1000);

// ============================
// ABAS
// ============================
function trocarAba(n) {
  [1,2,3].forEach(i => {
    document.getElementById('aba'+i).style.display = i===n?'block':'none';
    document.getElementById('tab'+i).className = 'tab '+(i===n?'on':'off');
  });
  if (n === 2) { atualizarProf(); }
  if (n === 3) { atualizarProfNow(); }
}

// ============================
// STORAGE
// ============================
function getAgenda() { return JSON.parse(localStorage.getItem('fisiot_agenda_v2')||'{}'); }
function saveAgenda(a) { localStorage.setItem('fisiot_agenda_v2', JSON.stringify(a)); }

// ============================
// RENDER AGENDA
// ============================
function renderAgenda() {
  const agenda = getAgenda();
  const agora = new Date();
  const horaAtual = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(horaAtual);

  const grid = document.getElementById('gin-grid');
  grid.innerHTML = '';

  ['G1','G2','G3'].forEach(ginId => {
    const cfg = AGENDA_CONFIG[ginId];
    const prof = getProfissional(ginId, periodo);
    if (!prof) return; // não tem esse período nesse ginásio

    const horarios = getHorarios(ginId, periodo);
    const pacientes = (agenda[ginId] && agenda[ginId][periodo]) ? agenda[ginId][periodo] : {};

    const card = document.createElement('div');
    card.className = 'gin-card';

    let items = horarios.map((h, i) => {
      const pac = pacientes[h] || {};
      const nome = pac.nome || '';
      const chamado = pac.chamado || false;
      let cls = '', statusCls = 'esp', statusTxt = '—';
      if (chamado) { cls='chamado'; statusCls='ok'; statusTxt='✅'; }
      else if (h === horaAtual) { cls='atual'; statusCls='atual'; statusTxt='🔔 AGORA'; }
      else if (nome && h > horaAtual) { statusTxt = '⏳'; }
      return `<div class="seq-item ${cls}" id="si-${ginId}-${i}">
        <div class="seq-num">${i+1}</div>
        <div class="seq-hora">${h}</div>
        <div class="seq-nome">${nome || '<span style="color:rgba(255,255,255,.25);font-size:.8rem">vazio</span>'}</div>
        <span class="seq-status ${statusCls}">${statusTxt}</span>
        ${nome ? `<button class="seq-btn" onclick="chamarPaciente('${ginId}','${h}')">📢</button>` : ''}
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="gin-title">
        <h2>${cfg.nome}</h2>
        <button class="btn-sec" onclick="limparGin('${ginId}')">🗑</button>
      </div>
      <div class="gin-prof">${prof}</div>
      ${items || '<div class="empty">Sem horários neste período</div>'}
    `;
    grid.appendChild(card);
  });
}

// ============================
// ADICIONAR PACIENTE
// ============================
function atualizarProf() {
  const ginId = document.getElementById('add-gin').value;
  const agora = new Date();
  const hStr = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(hStr);
  const prof = getProfissional(ginId, periodo);

  document.getElementById('add-prof-display').textContent = prof || 'Sem atendimento neste período';

  const sel = document.getElementById('add-hora');
  sel.innerHTML = '';
  const horarios = getHorarios(ginId, periodo);
  horarios.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h; opt.textContent = h;
    sel.appendChild(opt);
  });
  if (!horarios.length) {
    const opt = document.createElement('option');
    opt.textContent = 'Sem horários disponíveis';
    sel.appendChild(opt);
  }
}

function adicionarPaciente() {
  const nome = document.getElementById('add-nome').value.trim();
  const ginId = document.getElementById('add-gin').value;
  const hora = document.getElementById('add-hora').value;
  if (!nome) { alert('Digite o nome do paciente!'); return; }

  const agora = new Date();
  const hStr = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(hStr);

  const agenda = getAgenda();
  if (!agenda[ginId]) agenda[ginId] = {};
  if (!agenda[ginId][periodo]) agenda[ginId][periodo] = {};
  agenda[ginId][periodo][hora] = { nome, chamado: false };
  saveAgenda(agenda);

  document.getElementById('add-nome').value = '';
  document.getElementById('add-ok').style.display = 'block';
  setTimeout(() => document.getElementById('add-ok').style.display='none', 2500);
  renderAgenda();
}

function limparGin(ginId) {
  if (!confirm('Limpar agenda do '+AGENDA_CONFIG[ginId].nome+'?')) return;
  const agenda = getAgenda();
  const agora = new Date();
  const hStr = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(hStr);
  if (agenda[ginId]) agenda[ginId][periodo] = {};
  saveAgenda(agenda);
  renderAgenda();
}

// ============================
// CHAMAR
// ============================
function falar(msg) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(msg);
    utt.lang = 'pt-BR'; utt.rate = 0.88; utt.pitch = 1; utt.volume = 1;
    const voices = window.speechSynthesis.getVoices();
    const voz = voices.find(v => v.lang==='pt-BR') || voices.find(v => v.lang.startsWith('pt'));
    if (voz) utt.voice = voz;
    window.speechSynthesis.speak(utt);
  }, 100);
}

function mostrarBanner(txt) {
  const b = document.getElementById('chamada-banner');
  document.getElementById('chamada-banner-txt').innerHTML = txt;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 7000);
}

function chamarPaciente(ginId, hora) {
  const agora = new Date();
  const hStr = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(hStr);
  const agenda = getAgenda();
  const pac = agenda[ginId] && agenda[ginId][periodo] && agenda[ginId][periodo][hora];
  if (!pac) return;

  const prof = getProfissional(ginId, periodo);
  const gin = AGENDA_CONFIG[ginId].nome;
  const msg = `Atenção! Paciente ${pac.nome}, por favor dirija-se ao ${gin}.`;

  falar(msg);
  mostrarBanner(`<span>${pac.nome}</span> → ${gin} · ${prof} · ${hora}`);

  // Salvar no localStorage para a TV mostrar
  localStorage.setItem('fisiot_chamada', JSON.stringify({
    nome: pac.nome, ginasio: gin, profissional: prof, horario: hora,
    msg, timestamp: Date.now()
  }));

  agenda[ginId][periodo][hora].chamado = true;
  saveAgenda(agenda);
  renderAgenda();
}

function chamarAgora() {
  const nome = document.getElementById('now-nome').value.trim();
  const ginId = document.getElementById('now-gin').value;
  if (!nome) { alert('Digite o nome!'); return; }

  const agora = new Date();
  const hStr = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(hStr);
  const prof = getProfissional(ginId, periodo);
  const gin = AGENDA_CONFIG[ginId].nome;
  const msg = `Atenção! Paciente ${nome}, por favor dirija-se ao ${gin}.`;

  falar(msg);
  mostrarBanner(`<span>${nome}</span> → ${gin} · ${prof || ''} · ${hStr}`);
  localStorage.setItem('fisiot_chamada', JSON.stringify({
    nome, ginasio: gin, profissional: prof, horario: hStr, msg, timestamp: Date.now()
  }));

  document.getElementById('now-ok').style.display = 'block';
  setTimeout(() => document.getElementById('now-ok').style.display='none', 3000);
  document.getElementById('now-nome').value = '';
}

function atualizarProfNow() {
  const ginId = document.getElementById('now-gin').value;
  const agora = new Date();
  const hStr = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(hStr);
  const prof = getProfissional(ginId, periodo);
  document.getElementById('now-prof-display').textContent = prof || 'Sem atendimento neste período';
}

// ============================
// AUTO-CHAMADA por horário
// ============================
var ultimaAutoChamada = null;
function verificarAutoChamada() {
  const agora = new Date();
  const horaAtual = agora.getHours().toString().padStart(2,'0') + ':' + agora.getMinutes().toString().padStart(2,'0');
  const periodo = getPeriodo(horaAtual);
  const agenda = getAgenda();

  ['G1','G2','G3'].forEach(ginId => {
    const prof = getProfissional(ginId, periodo);
    if (!prof) return;
    const horarios = getHorarios(ginId, periodo);
    if (!horarios.includes(horaAtual)) return;
    const pac = agenda[ginId] && agenda[ginId][periodo] && agenda[ginId][periodo][horaAtual];
    if (!pac || pac.chamado) return;

    const chave = ginId + '_' + horaAtual + '_' + pac.nome;
    if (ultimaAutoChamada === chave) return;
    ultimaAutoChamada = chave;
    chamarPaciente(ginId, horaAtual);
  });
}

setInterval(verificarAutoChamada, 30000);
setInterval(renderAgenda, 60000);

// ============================
// INIT
// ============================
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
atualizarProf();
atualizarProfNow();
renderAgenda();
</script>
